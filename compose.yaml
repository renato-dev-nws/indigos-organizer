services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - mailpit
            - evolution-api
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:7-alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    evolution-api:
        image: 'evoapicloud/evolution-api:latest'
        restart: always
        ports:
            - '${FORWARD_EVOLUTION_API_PORT:-8080}:8080'
        environment:
            SERVER_TYPE: http
            SERVER_PORT: 8080
            SERVER_URL: '${APP_URL:-http://localhost}:8080'
            AUTHENTICATION_API_KEY: '${EVOLUTION_API_MASTER_KEY:-change_me}'
            DATABASE_PROVIDER: postgresql
            DATABASE_CONNECTION_URI: 'postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?schema=evolution_api'
            DATABASE_CONNECTION_CLIENT_NAME: 'band_organizer_evolution'
            STORE_MESSAGES: false
            CLEAN_TICKET_INTERVAL: 1
            TELEMETRY_ENABLED: false
            CACHE_REDIS_ENABLED: true
            CACHE_REDIS_URI: 'redis://redis:6379/6'
            CACHE_REDIS_PREFIX_KEY: 'band_organizer_evolution'
            CACHE_LOCAL_ENABLED: false
        volumes:
            - 'sail-evolution:/evolution/instances'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-evolution:
        driver: local
